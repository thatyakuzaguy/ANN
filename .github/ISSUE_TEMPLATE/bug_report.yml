name: Bug report
description: Report a reproducible defect in ANN.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include model files, secrets, approval tokens, or private project data.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: Include the smallest safe sequence that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ANN version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, Python/Node versions, backend, and GPU when relevant.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, tokens, private code, and personal data.
          required: true
